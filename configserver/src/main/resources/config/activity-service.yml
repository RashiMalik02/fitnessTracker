spring:
  application:
    name: activity-service
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: fitnessTracker
  rabbitmq:
    addresses: ${RABBITMQ_URL}

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8671/eureka/}

RabbitMQ:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking